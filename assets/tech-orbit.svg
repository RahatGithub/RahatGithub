<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a0b2e"/>
    </linearGradient>

    <linearGradient id="centerTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff">
        <animate attributeName="stop-color" values="#00f5ff;#a855f7;#ec4899;#00f5ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#ec4899;#00f5ff;#a855f7" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle starfield -->
  <g fill="white">
    <circle cx="80" cy="80" r="0.8" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="120" r="0.6" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="500" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="480" r="0.6" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="300" r="0.6" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="320" r="0.8" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="180" r="0.5" opacity="0.6"/>
    <circle cx="750" cy="200" r="0.5" opacity="0.4"/>
    <circle cx="60" cy="450" r="0.5" opacity="0.5"/>
    <circle cx="740" cy="550" r="0.5" opacity="0.3"/>
  </g>

  <!-- Orbital ring paths (static, dashed) -->
  <g fill="none" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,5" opacity="0.4">
    <circle cx="400" cy="300" r="120"/>
    <circle cx="400" cy="300" r="200"/>
    <circle cx="400" cy="300" r="270"/>
  </g>

  <!-- Center glow (pulsing) -->
  <circle cx="400" cy="300" r="100" fill="url(#centerGlow)">
    <animate attributeName="r" values="100;115;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Center hub -->
  <circle cx="400" cy="300" r="40" fill="#0d1b2a" stroke="url(#centerTextGrad)" stroke-width="2" filter="url(#strongGlow)"/>
  <text x="400" y="296" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-weight="700" font-size="18" fill="url(#centerTextGrad)">RAHAT</text>
  <text x="400" y="316" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#94a3b8">.stack( )</text>

  <!-- INNER ORBIT — Languages (clockwise, ~20s rotation) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="22s" repeatCount="indefinite"/>
    <!-- Each tech node rotates with its parent group, BUT keep its label upright via counter-rotation -->
    <g transform="translate(520 300)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="22s" repeatCount="indefinite"/>
        <circle r="7" fill="#f7df1e" filter="url(#nodeGlow)"/>
        <text x="14" y="5" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#f8fafc">JavaScript</text>
      </g>
    </g>
    <g transform="translate(280 300)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="22s" repeatCount="indefinite"/>
        <circle r="7" fill="#3178c6" filter="url(#nodeGlow)"/>
        <text x="14" y="5" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#f8fafc">TypeScript</text>
      </g>
    </g>
    <g transform="translate(400 180)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="22s" repeatCount="indefinite"/>
        <circle r="7" fill="#3776ab" filter="url(#nodeGlow)"/>
        <text x="14" y="5" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#f8fafc">Python</text>
      </g>
    </g>
    <g transform="translate(400 420)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="22s" repeatCount="indefinite"/>
        <circle r="7" fill="#e34f26" filter="url(#nodeGlow)"/>
        <text x="14" y="5" font-family="'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="#f8fafc">HTML / CSS</text>
      </g>
    </g>
  </g>

  <!-- MIDDLE ORBIT — Frameworks (counter-clockwise, ~32s rotation) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 400 300" to="0 400 300" dur="32s" repeatCount="indefinite"/>
    <g transform="translate(600 300)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="-360" to="0" dur="32s" repeatCount="indefinite"/>
        <circle r="8" fill="#61dafb" filter="url(#nodeGlow)"/>
        <text x="15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="15" font-weight="600" fill="#f8fafc">React</text>
      </g>
    </g>
    <g transform="translate(200 300)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="-360" to="0" dur="32s" repeatCount="indefinite"/>
        <circle r="8" fill="#ffffff" filter="url(#nodeGlow)"/>
        <text x="15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="15" font-weight="600" fill="#f8fafc">Next.js</text>
      </g>
    </g>
    <g transform="translate(400 100)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="-360" to="0" dur="32s" repeatCount="indefinite"/>
        <circle r="8" fill="#339933" filter="url(#nodeGlow)"/>
        <text x="15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="15" font-weight="600" fill="#f8fafc">Node.js</text>
      </g>
    </g>
    <g transform="translate(400 500)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="-360" to="0" dur="32s" repeatCount="indefinite"/>
        <circle r="8" fill="#10b981" filter="url(#nodeGlow)"/>
        <text x="15" y="5" font-family="'Helvetica Neue', sans-serif" font-size="15" font-weight="600" fill="#f8fafc">Django</text>
      </g>
    </g>
  </g>

  <!-- OUTER ORBIT — Databases & Tools (clockwise, ~50s rotation) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="50s" repeatCount="indefinite"/>
    <g transform="translate(670 300)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="6" fill="#4169e1"/>
        <text x="13" y="4" font-family="'Helvetica Neue', sans-serif" font-size="13" fill="#cbd5e1">PostgreSQL</text>
      </g>
    </g>
    <g transform="translate(130 300)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="6" fill="#47a248"/>
        <text x="13" y="4" font-family="'Helvetica Neue', sans-serif" font-size="13" fill="#cbd5e1">MongoDB</text>
      </g>
    </g>
    <g transform="translate(400 30)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="6" fill="#dc382d"/>
        <text x="13" y="4" font-family="'Helvetica Neue', sans-serif" font-size="13" fill="#cbd5e1">Redis</text>
      </g>
    </g>
    <g transform="translate(400 570)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="6" fill="#2496ed"/>
        <text x="13" y="4" font-family="'Helvetica Neue', sans-serif" font-size="13" fill="#cbd5e1">Docker</text>
      </g>
    </g>
    <g transform="translate(580 491)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="5" fill="#f05032"/>
        <text x="11" y="4" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#cbd5e1">Git</text>
      </g>
    </g>
    <g transform="translate(220 109)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="5" fill="#fcc624"/>
        <text x="11" y="4" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#cbd5e1">Linux</text>
      </g>
    </g>
    <g transform="translate(580 109)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="5" fill="#ff6c37"/>
        <text x="11" y="4" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#cbd5e1">Postman</text>
      </g>
    </g>
    <g transform="translate(220 491)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>
        <circle r="5" fill="#06b6d4"/>
        <text x="11" y="4" font-family="'Helvetica Neue', sans-serif" font-size="12" fill="#cbd5e1">Tailwind</text>
      </g>
    </g>
  </g>

  <!-- Section label at top -->
  <text x="400" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#00f5ff" letter-spacing="6">━ THE TECH STACK ━</text>

  <!-- Section label at bottom -->
  <text x="400" y="582" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#475569" letter-spacing="4">orbital · animated · live</text>
</svg>
